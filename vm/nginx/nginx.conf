events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name soagbct2026.mooo.com;

        client_max_body_size 50M;

        # Redirección forzada a HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name soagbct2026.mooo.com;

        ssl_certificate     /etc/letsencrypt/live/soagbct2026.mooo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/soagbct2026.mooo.com/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;

        # ==========================================
        # 1. FRONTEND (La Interfaz Web de la Fase 2)
        # ==========================================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html; # Fundamental para que funcionen las SPAs (React/Vue)
            # Evitar que el navegador sirva JS/CSS viejos cacheados durante el desarrollo.
            add_header Cache-Control "no-store, must-revalidate";
        }

        # ==========================================
        # 2. NODE-RED (Editor y Endpoints)
        # ==========================================
        # Para que vos entres a programar los flujos: https://soagbct2026.mooo.com/nodered/
        location /nodered/ {
            proxy_pass         http://soa_nodered:1880/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Para que el Frontend le pegue a las APIs: https://soagbct2026.mooo.com/api/detections
        location /api/ {
            proxy_pass         http://soa_nodered:1880/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # El enrolamiento del 2FA procesa varias imágenes contra la GPU
            # (FastAPI) de a una; puede tardar más que el default de 60s.
            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # ==========================================
        # 3. SEAWEEDFS (Almacenamiento)
        # ==========================================
        location /storage/ {
            proxy_pass         http://soa_seaweedfs:9333/;
            proxy_set_header   Host $host;
        }

        # ==========================================
        # 4. KEYCLOAK (Seguridad IAM)
        # ==========================================
        # https://soagbct2026.mooo.com/auth/
        location /auth/ {
            proxy_pass         http://soa_keycloak:8080/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # 5. GRAFANA (Observabilidad)
        # ==========================================
        # https://soagbct2026.mooo.com/grafana/
        location /grafana/ {
            proxy_pass         http://soa_grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # 6. ADMINER (Gestor de BD)
        # ==========================================
        # https://soagbct2026.mooo.com/adminer/
        location /adminer/ {
            proxy_pass         http://soa_adminer:8080/;
            proxy_set_header   Host $host;
        }
	# ==========================================
        # 7. TELEMETRÍA (Prometheus Exporter de Node-RED)
        # ==========================================
       
        location /metrics {
            proxy_pass         http://soa_nodered:1880/metrics;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
