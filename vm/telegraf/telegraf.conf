# Configuración global del agente
[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "soa_orquestador"
  omit_hostname = false

# ==========================================
# OUTPUTS (A dónde manda los datos)
# ==========================================
[[outputs.influxdb]]
  urls = ["http://soa_influxdb:8086"]
  database = "soa_metrics" # La misma que pusiste en el .env
  timeout = "5s"
  
# ==========================================
# INPUTS (De dónde saca los datos)
# ==========================================
# 1. Leer métricas del hardware de los contenedores
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  timeout = "5s"

# Leer métricas de CPU y RAM de la máquina virtual host
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
[[inputs.mem]]
[[inputs.system]]
[[inputs.net]]
[[inputs.disk]]

# 2. Métricas de Node-RED (Fase 1)
[[inputs.prometheus]]
  # Viaja por la red interna de Docker, sin pasar por Nginx
  urls = ["http://soa_nodered:1880/metrics"]
  metric_version = 1

# 3. Métricas del Motor IA FastAPI (Arquitectura Distribuida - ZeroTier)
[[inputs.prometheus]]
  # Va a buscar los datos a la PC de tu compañero a través de la VPN
  urls = ["http://10.158.125.189:8000/metrics"]
  metric_version = 1
