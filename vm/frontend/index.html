<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F6F4EF" />

  <!-- Tema: resolver antes de pintar para evitar parpadeo (FOUC). Usa la
       preferencia guardada o, si no hay, el tema del sistema. -->
  <script>
    (function () {
      try {
        var m = localStorage.getItem('atalaya.theme');
        if (!m) m = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = m;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = m === 'dark' ? '#17150F' : '#F6F4EF';
      } catch (e) { document.documentElement.dataset.theme = 'light'; }
    })();
  </script>
  <title>Atalaya</title>
  <meta name="description" content="Atalaya — consola de visión y reconocimiento" />

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/favicon.svg" />

  <!-- Leaflet para mapas -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Figtree:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/styles.css" />

  <script type="importmap">
  {
    "imports": {
      "vue": "/vendor/vue.esm-browser.prod.js"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
